<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B2B 거래처 반복 업무 관리 시스템</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header no-print">
      <div class="header-inner">
        <div>
          <p class="eyebrow">LocalStorage 기반 업무 관리</p>
          <h1>B2B 거래처 반복 업무 관리 시스템</h1>
        </div>
        <div class="storage-pill">sme_b2b_system_data</div>
      </div>
    </header>

    <div class="app-shell">
      <nav class="main-nav no-print" aria-label="주 메뉴">
        <button class="nav-button active" type="button" data-target="dashboard">대시보드</button>
        <button class="nav-button" type="button" data-target="clients">거래처 관리</button>
        <button class="nav-button" type="button" data-target="templates">반복업무 템플릿</button>
        <button class="nav-button" type="button" data-target="tasks">업무 리스트</button>
        <button class="nav-button" type="button" data-target="reports">조회/출력</button>
      </nav>

      <main>
        <section id="dashboard" class="view active" aria-labelledby="dashboard-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Dashboard</p>
              <h2 id="dashboard-title">오늘의 업무 현황</h2>
            </div>
            <p id="todayLabel" class="muted"></p>
          </div>
          <div id="summaryCards" class="summary-grid"></div>
          <div class="content-grid">
            <div class="panel">
              <div class="panel-title-row">
                <h3>다가오는 업무</h3>
                <span class="muted">완료 버튼은 상세 기록 모달을 엽니다</span>
              </div>
              <div id="upcomingTasks" class="stack-list"></div>
            </div>
            <div class="panel">
              <div class="panel-title-row">
                <h3>거래처별 업무 수</h3>
              </div>
              <div id="clientWorkload" class="stack-list"></div>
            </div>
          </div>
        </section>

        <section id="clients" class="view" aria-labelledby="clients-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Clients</p>
              <h2 id="clients-title">거래처 관리</h2>
            </div>
          </div>
          <div id="clientList" class="card-grid"></div>
        </section>

        <section id="templates" class="view" aria-labelledby="templates-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Templates</p>
              <h2 id="templates-title">반복업무 템플릿</h2>
            </div>
          </div>
          <div id="templateList" class="card-grid"></div>
        </section>

        <section id="tasks" class="view" aria-labelledby="tasks-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Tasks</p>
              <h2 id="tasks-title">업무 리스트</h2>
            </div>
            <div class="filter-row no-print">
              <label for="taskStatusFilter">상태</label>
              <select id="taskStatusFilter">
                <option value="all">전체</option>
                <option value="대기">대기</option>
                <option value="진행중">진행중</option>
                <option value="완료">완료</option>
              </select>
            </div>
          </div>
          <div id="taskList" class="stack-list"></div>
        </section>

        <section id="reports" class="view" aria-labelledby="reports-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Reports</p>
              <h2 id="reports-title">조회/출력</h2>
            </div>
            <div class="action-row no-print">
              <button id="printReport" class="secondary-button" type="button">인쇄</button>
              <button id="downloadCsv" class="primary-button" type="button">CSV 다운로드</button>
            </div>
          </div>

          <div class="report-tools no-print">
            <label for="reportSearch">검색</label>
            <input id="reportSearch" type="search" placeholder="거래처명 또는 업무명" />
            <label for="reportStatusFilter">상태</label>
            <select id="reportStatusFilter">
              <option value="all">전체</option>
              <option value="대기">대기</option>
              <option value="진행중">진행중</option>
              <option value="완료">완료</option>
            </select>
          </div>

          <div class="report-panel">
            <div class="print-title">
              <h2>거래처 중심 업무 완료 이력 보고서</h2>
              <p id="printDate"></p>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>거래처</th>
                    <th>업무명</th>
                    <th>마감일</th>
                    <th>상태</th>
                    <th>실제완료일</th>
                    <th>완료내용</th>
                    <th>실행메모</th>
                  </tr>
                </thead>
                <tbody id="reportRows"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="completionModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-panel">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Completion</p>
            <h2 id="modalTitle">업무 완료 처리</h2>
          </div>
          <button id="closeModal" class="icon-button" type="button" aria-label="닫기">×</button>
        </div>
        <form id="completionForm" class="modal-form">
          <div class="selected-task">
            <span>대상 업무</span>
            <strong id="modalTaskTitle"></strong>
          </div>

          <label for="completedAt">완료 날짜</label>
          <input id="completedAt" name="completedAt" type="date" required />

          <label for="completionNote">완료 내용</label>
          <input id="completionNote" name="completionNote" type="text" required placeholder="예: 월간 보고서 전달 완료" />

          <label for="executionMemo">실행 메모</label>
          <textarea id="executionMemo" name="executionMemo" rows="4" placeholder="실행 당시 특이사항을 기록하세요"></textarea>

          <p id="modalError" class="form-error" aria-live="polite"></p>

          <div class="modal-actions">
            <button id="cancelModal" class="secondary-button" type="button">취소</button>
            <button class="primary-button" type="submit">저장</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
